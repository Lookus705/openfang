# Local development keeps `build: .` enabled.
# For production on Coolify, use the pinned GHCR image produced by
# .github/workflows/build-coolify-ghcr.yml under your own GitHub namespace.

version: "3.8"
services:
  openfang:
    build: .
    # image: ghcr.io/lookus705/openfang:0.6.9
    ports:
      - "4200:4200"
    volumes:
      - openfang-data:/data
    # Uncomment to reach host services (Ollama, whisper.cpp, local Postgres)
    # from inside the container. Required on Linux and colima. See
    # docs/troubleshooting.md#connecting-to-host-services-from-docker.
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
    restart: unless-stopped

volumes:
  openfang-data:
