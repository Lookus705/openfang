name: Build Coolify GHCR Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and publish OpenFang image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read image configuration
        id: config
        shell: bash
        run: |
          set -a
          source deploy/coolify/image.env
          set +a
          arch_suffix="${TARGET_PLATFORM#linux/}"
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_ref="ghcr.io/${owner_lc}/${IMAGE_NAME}"
          echo "openfang_version=${OPENFANG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "target_platform=${TARGET_PLATFORM}" >> "$GITHUB_OUTPUT"
          echo "arch_suffix=${arch_suffix}" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          if [[ "${TARGET_PLATFORM}" != "linux/amd64" && "${TARGET_PLATFORM}" != "linux/arm64" ]]; then
            echo "Unsupported TARGET_PLATFORM=${TARGET_PLATFORM}" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ steps.config.outputs.target_platform }}
          tags: |
            ${{ steps.config.outputs.image_ref }}:${{ steps.config.outputs.image_tag }}
            ${{ steps.config.outputs.image_ref }}:${{ steps.config.outputs.image_tag }}-${{ steps.config.outputs.arch_suffix }}
            ${{ steps.config.outputs.image_ref }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=OpenFang
            org.opencontainers.image.description=OpenFang with dashboard, backend, agents, and runtime dependencies for Coolify deployments
            org.opencontainers.image.version=${{ steps.config.outputs.openfang_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish build summary
        shell: bash
        run: |
          {
            echo "## Coolify image published"
            echo ""
            echo "- OpenFang version: \`${{ steps.config.outputs.openfang_version }}\`"
            echo "- Platform: \`${{ steps.config.outputs.target_platform }}\`"
            echo "- Main image tag: \`${{ steps.config.outputs.image_ref }}:${{ steps.config.outputs.image_tag }}\`"
            echo "- Arch tag: \`${{ steps.config.outputs.image_ref }}:${{ steps.config.outputs.image_tag }}-${{ steps.config.outputs.arch_suffix }}\`"
            echo "- Immutable tag: \`${{ steps.config.outputs.image_ref }}:sha-${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
